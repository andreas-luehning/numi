<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Numi</title>
  <meta name="theme-color" content="#FFC93C" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Numi" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <style>
    html, body { margin: 0; padding: 0; background: #FFE9C7; -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior: none; }
    #root { min-height: 100vh; min-height: 100dvh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      // Bei aktiviertem Update einmalig neu laden (nicht beim ersten Installieren).
      var hadController = !!navigator.serviceWorker.controller;
      var refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (refreshing || !hadController) return;
        refreshing = true;
        window.location.reload();
      });
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("service-worker.js", { updateViaCache: "none" })
          .catch(function (e) {
            console.log("SW-Registrierung fehlgeschlagen:", e);
          });
      });
    }
  </script>
</body>
</html>
